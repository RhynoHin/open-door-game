<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Mochi Moon Room</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="game-shell" aria-label="Mochi Moon Room 3D 解謎逃出密室遊戲">
      <canvas id="game"></canvas>

      <section id="menu-panel" class="panel">
        <div class="mascot" aria-hidden="true"></div>
        <div class="kicker">3D 逃出密室</div>
        <h1>Mochi Moon Room</h1>
        <p id="menu-copy">
          幫可愛嘅 Mochi 喺月光玩具房搵齊三粒星光，啟動門口水晶就可以逃出密室。
          用手指拖動畫面望四周，點物件解謎。
        </p>
        <button id="start-btn" type="button">開始解謎</button>
      </section>

      <section id="hud" aria-live="polite">
        <div id="objective">搵線索</div>
        <div id="inventory"></div>
      </section>

      <section id="toast" class="hidden"></section>

      <nav id="touch-controls" aria-label="遊戲控制">
        <button class="ctrl-btn" type="button" data-action="left" aria-label="向左望">↺</button>
        <button class="ctrl-btn" type="button" data-action="right" aria-label="向右望">↻</button>
        <button class="ctrl-btn primary" type="button" data-action="interact" aria-label="互動">摸</button>
        <button class="ctrl-btn" type="button" data-action="hint" aria-label="提示">?</button>
        <button class="ctrl-btn" type="button" data-action="reset" aria-label="重新開始">重</button>
      </nav>
    </main>

    <script type="module" src="game.js"></script>
  </body>
</html>
