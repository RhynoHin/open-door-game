<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Elite Ring Clash</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="game-shell" aria-label="Elite Ring Clash 摔角卡牌遊戲">
      <canvas id="game"></canvas>

      <section id="topbar">
        <div id="brand">Elite Ring Clash</div>
        <div id="status-pill">Menu</div>
        <button id="audio-btn" type="button" aria-label="音樂開關">音樂</button>
      </section>

      <section id="menu" class="panel">
        <div class="kicker">AEW-style fan card battler</div>
        <h1>Elite Ring Clash</h1>
        <p>
          原創角色、原創音樂同特效，玩法受電視摔角節奏啟發。出招、反擊、搶觀眾反應，
          三回合 pinfall 決勝。
        </p>
        <div class="menu-grid">
          <button class="menu-btn" type="button" data-mode="offline">Offline 兩個人</button>
          <button class="menu-btn" type="button" data-mode="online-host">Online 開房</button>
          <button class="menu-btn" type="button" data-mode="online-join">Online 入房</button>
        </div>
        <label id="room-entry">
          Room code
          <input id="room-input" maxlength="6" autocomplete="off" placeholder="例如 A7KQ" />
        </label>
      </section>

      <section id="toast" class="hidden" aria-live="polite"></section>
    </main>

    <script type="module" src="game.js"></script>
  </body>
</html>
