name: Publish Mooncare to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "mooncare/**"
      - ".github/workflows/mooncare-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: mooncare-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Mooncare site
        run: |
          mkdir -p _site/mooncare
          cp -R mooncare/. _site/mooncare/
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="zh-Hant">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=./mooncare/">
              <title>月伴</title>
            </head>
            <body><a href="./mooncare/">進入月伴</a></body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
